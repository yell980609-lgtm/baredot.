<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Q&A | BARE.</title>
<style>
@font-face{font-family:InterDisplay;src:url(https://framerusercontent.com/assets/qITWJ2WdG0wrgQPDb8lvnYnTXDg.woff2) format('woff2');font-weight:700;font-display:swap}
*{box-sizing:border-box}body{margin:0;background:#fff;color:#050505;font-family:InterDisplay,"Apple SD Gothic Neo",Pretendard,"Noto Sans KR",system-ui,sans-serif}.wrap{width:min(720px,calc(100% - 36px));margin:0 auto;padding:44px 0 80px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:56px}.brand img{width:64px;filter:brightness(0)}.home{color:#050505;text-decoration:none;font:900 12px/1 InterDisplay,sans-serif;text-transform:uppercase}h1{margin:0 0 14px;font-size:clamp(34px,5vw,58px);line-height:.95;text-transform:uppercase}p{margin:0 0 28px;color:#555;font:800 14px/1.65 Pretendard,"Noto Sans KR",sans-serif}.form{display:grid;gap:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{display:grid;gap:7px}.field span{font:900 12px/1 Pretendard,"Noto Sans KR",sans-serif}.field input,.field select,.field textarea{width:100%;border:1px solid #d6d6d6;background:#fff;color:#050505;padding:13px;font:800 14px/1.5 Pretendard,"Noto Sans KR",sans-serif}.field textarea{min-height:180px;resize:vertical}.submit{min-height:52px;border:0;background:#050505;color:#fff;font:900 15px/1 Pretendard,"Noto Sans KR",sans-serif;cursor:pointer}.submit:disabled{opacity:.55;cursor:wait}.status{min-height:22px;color:#555;font:800 13px/1.5 Pretendard,"Noto Sans KR",sans-serif}@media(max-width:640px){.grid{grid-template-columns:1fr}.wrap{padding-top:28px}.top{margin-bottom:42px}}
</style>
</head>
<body>
<main class="wrap">
<header class="top"><a class="brand" href="/" aria-label="BARE. home"><img src="https://framerusercontent.com/images/a3Pvzk5vHkS6uAT6JGV5VgPpTZk.png?width=1080&height=1080" alt="BARE."></a><a class="home" href="/">Back to shop</a></header>
<h1>Q&A</h1>
<p>주문, 배송, 제품 문의를 남겨주세요. 관리자 페이지에서 확인 후 답변드릴게요.</p>
<form class="form" id="qna-form">
  <div class="grid"><label class="field"><span>이름</span><input name="name" autocomplete="name"></label><label class="field"><span>연락처</span><input name="phone" autocomplete="tel"></label></div>
  <div class="grid"><label class="field"><span>이메일</span><input name="email" type="email" autocomplete="email"></label><label class="field"><span>분류</span><select name="category"><option>상품 문의</option><option>주문/결제</option><option>배송</option><option>교환/반품</option><option>기타</option></select></label></div>
  <label class="field"><span>문의 내용</span><textarea name="message" required placeholder="문의 내용을 입력해주세요."></textarea></label>
  <button class="submit" type="submit">문의 남기기</button>
  <div class="status" id="status" aria-live="polite"></div>
</form>
</main>
<script>
const form=document.getElementById('qna-form'),status=document.getElementById('status'),submit=form.querySelector('.submit');
form.addEventListener('submit',async event=>{event.preventDefault();const data=Object.fromEntries(new FormData(form));submit.disabled=true;status.textContent='문의를 저장하고 있습니다.';try{const response=await fetch('/api/inquiries',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const result=await response.json();if(!response.ok)throw new Error(result.message||'문의 저장에 실패했습니다.');form.reset();status.textContent='문의가 접수되었습니다.'}catch(error){status.textContent=error.message}finally{submit.disabled=false}});
</script>
</body>
</html>
