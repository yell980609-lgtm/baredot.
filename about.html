<!doctype html>
<html lang="ko">
<head>

<style>
@font-face{font-family:InterDisplay;src:url(https://framerusercontent.com/assets/qITWJ2WdG0wrgQPDb8lvnYnTXDg.woff2) format('woff2');font-weight:700;font-display:swap}
*{box-sizing:border-box}body{margin:0;background:#fff;color:#050505;font-family:InterDisplay,Pretendard,'Noto Sans KR',system-ui,sans-serif}.wrap{width:min(1080px,calc(100% - 36px));margin:auto}.top{display:flex;justify-content:space-between;align-items:center;padding:24px 0;border-bottom:1px solid #050505}.brand{font-size:18px;text-decoration:none}.back{font-size:12px;text-transform:uppercase;color:#050505}.hero{padding:92px 0 70px}.kicker{margin:0 0 14px;font-size:12px;text-transform:uppercase}.title{margin:0;max-width:900px;font-size:clamp(46px,8vw,120px);line-height:.92;text-transform:uppercase}.body{display:grid;grid-template-columns:minmax(0,.8fr) minmax(320px,1fr);gap:clamp(34px,6vw,90px);padding:0 0 110px}.body h2{margin:0;font-size:clamp(24px,3vw,42px);line-height:1.1;text-transform:uppercase}.copy{display:grid;gap:18px;color:#1e1e1e;font:700 clamp(15px,1.45vw,19px)/1.8 Pretendard,'Noto Sans KR',sans-serif}.story-link{display:block;padding:0 0 20px;border-bottom:1px solid #d9d9d9;color:#1e1e1e;text-decoration:none;transition:color .18s,border-color .18s}.story-link:hover{border-color:#050505;color:#050505}.story-link p{margin:0}.story-link span{display:block;margin-top:9px;color:#777;font:900 11px/1 InterDisplay,Pretendard,sans-serif;text-transform:uppercase}.story-card{display:grid;grid-template-columns:118px minmax(0,1fr);gap:16px;align-items:center}.story-thumb{width:118px;aspect-ratio:1;background:#eee;overflow:hidden}.story-thumb img{width:100%;height:100%;object-fit:cover}.story-title{font-size:clamp(16px,1.65vw,22px);font-weight:900;line-height:1.35;word-break:keep-all}.note{margin-top:18px;color:#777;font-size:13px}@media(max-width:760px){.hero{padding:64px 0 46px}.body{grid-template-columns:1fr;padding-bottom:72px}.title{font-size:48px}.story-card{grid-template-columns:92px minmax(0,1fr)}.story-thumb{width:92px}}
</style>
<style>.about-partner{position:fixed;right:18px;bottom:18px;z-index:50;display:inline-flex;align-items:center;justify-content:center;min-height:38px;padding:0 14px;border:1px solid #fff;background:#050505;color:#fff;font:900 12px/1 Pretendard,'Noto Sans KR',sans-serif;text-decoration:none;cursor:pointer}.partner-popup{position:fixed;inset:0;z-index:80;display:grid;place-items:center;padding:24px;background:rgba(0,0,0,.64);opacity:0;visibility:hidden;pointer-events:none;transition:.2s}.partner-popup.is-open{opacity:1;visibility:visible;pointer-events:auto}.partner-card{position:relative;width:min(520px,calc(100vw - 34px));max-height:calc(100svh - 48px);overflow:auto;padding:34px;background:#fff;color:#050505}.partner-close{position:absolute;top:16px;right:16px;width:34px;height:34px;border:0;background:transparent;color:#050505;font:400 36px/.8 Arial,sans-serif;cursor:pointer}.partner-card h2{margin:0 44px 22px 0;font-size:clamp(23px,2.6vw,32px);line-height:1}.partner-form{display:grid;gap:14px}.partner-field{display:grid;gap:7px}.partner-field span{font:900 12px/1 Pretendard,'Noto Sans KR',sans-serif}.partner-field input{width:100%;min-height:44px;border:1px solid #d7d7d7;background:#fff;color:#050505;padding:0 12px;font:800 14px/1 Pretendard,'Noto Sans KR',sans-serif}.partner-field input[type=file]{display:flex;align-items:center;padding:10px 12px}.partner-submit{width:100%;min-height:50px;margin-top:6px;border:0;background:#050505;color:#fff;font:900 15px/1 Pretendard,'Noto Sans KR',sans-serif;cursor:pointer}.partner-status{min-height:18px;margin:0;color:#555;font:800 11px/1.45 Pretendard,'Noto Sans KR',sans-serif}@media(max-width:760px){.about-partner{right:14px;bottom:14px;min-height:34px;font-size:10px}.partner-card{padding:28px 20px}}</style></head>
<body>
<header class="wrap top"><a class="brand" href="index.html">BARE.</a><a class="back" href="index.html">Back to shop</a></header>
<main>
<section class="wrap hero"><p class="kicker">ABOUT BARE.</p><h1 class="title">Bare moves with you.</h1></section>
<section class="wrap body"><h2>Brand Story</h2><div class="copy"><a class="story-link" href="https://m.blog.naver.com/baredot/224296011657" target="_blank" rel="noopener"><p>베어닷은 움직이는 순간에도 몸의 선과 편안함이 자연스럽게 살아나는 애슬레저를 지향합니다.</p><span>Read on blog</span></a><a class="story-link" href="https://m.blog.naver.com/baredot/224296030144" target="_blank" rel="noopener"><p>불필요한 장식은 덜어내고, 소재와 핏, 작은 디테일에 집중해 일상과 운동 사이를 부드럽게 이어갑니다.</p><span>Read on blog</span></a><a class="story-link story-card" href="https://blog.naver.com/baredot/224301736916" target="_blank" rel="noopener"><div class="story-thumb"><img src="assets/about/ep2-leggings-origin.jpg" alt="[EP.2] 고무줄 품은 레깅스의 탄생 배경 / 베어닷"></div><div><p class="story-title">[EP.2] 고무줄 품은 레깅스의 탄생 배경 / 베어닷</p><span>Read on blog</span></div></a></div></section>
</main>
<aside class="partner-popup" aria-hidden="true" aria-labelledby="partner-title"><div class="partner-card"><button class="partner-close" type="button" aria-label="강사제휴 신청 폼 닫기">×</button><h2 id="partner-title">강사제휴 신청하기</h2><form class="partner-form" enctype="multipart/form-data"><label class="partner-field"><span>이름</span><input name="name" type="text" autocomplete="name" required></label><label class="partner-field"><span>전화번호</span><input name="phone" type="tel" autocomplete="tel" required></label><label class="partner-field"><span>이메일</span><input name="email" type="email" autocomplete="email" required></label><label class="partner-field"><span>직업</span><input name="job" type="text" required></label><label class="partner-field"><span>증빙 첨부파일</span><input name="proof" type="file" accept=".pdf,.jpg,.jpeg,.png,.webp,.heic" required></label><button class="partner-submit" type="submit">신청하기</button><p class="partner-status" aria-live="polite"></p></form></div></aside><button class="about-partner" type="button">강사제휴 신청하기</button><script>const partnerPopup=document.querySelector('.partner-popup'),partnerForm=document.querySelector('.partner-form'),openPartnerPopup=()=>{partnerPopup?.classList.add('is-open');partnerPopup?.setAttribute('aria-hidden','false')},closePartnerPopup=()=>{partnerPopup?.classList.remove('is-open');partnerPopup?.setAttribute('aria-hidden','true')};document.querySelector('.about-partner')?.addEventListener('click',openPartnerPopup);partnerPopup?.querySelector('.partner-close')?.addEventListener('click',closePartnerPopup);partnerPopup?.addEventListener('click',event=>{if(event.target===partnerPopup)closePartnerPopup()});partnerForm?.addEventListener('submit',event=>{event.preventDefault();const status=partnerForm.querySelector('.partner-status'),file=partnerForm.querySelector('input[type="file"]')?.files?.[0];if(!partnerForm.checkValidity()){partnerForm.reportValidity();return}status.textContent=file?'신청서가 작성되었습니다. 첨부파일: '+file.name:'신청서가 작성되었습니다.'});addEventListener('keydown',event=>{if(event.key==='Escape')closePartnerPopup()});</script></body>
</html>
