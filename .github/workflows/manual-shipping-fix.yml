name: Fix manual order shipping status
on:
  push:
    paths:
      - .github/manual-shipping-fix.cjs
      - .github/workflows/manual-shipping-fix.yml
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node .github/manual-shipping-fix.cjs
      - run: node --check _worker.js
      - run: |
          git config user.name "bare-dot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Auto-set manual orders to shipping when tracking is saved"
          git push
