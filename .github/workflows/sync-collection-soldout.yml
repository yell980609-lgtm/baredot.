name: Sync collection sold-out badges

on:
  push:
    paths:
      - .github/sync-collection-soldout.cjs
      - .github/workflows/sync-collection-soldout.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node .github/sync-collection-soldout.cjs
      - run: node --check _worker.js
      - run: |
          git config user.name "bare-dot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Keep collection sold-out badges in sync"
          git push
