name: Fix collection sold-out badges

on:
  push:
    paths:
      - .github/fix-collection-soldout.cjs
      - .github/workflows/fix-collection-soldout.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply collection sold-out fix
        run: node .github/fix-collection-soldout.cjs
      - name: Check worker syntax
        run: node --check _worker.js
      - name: Commit patch
        run: |
          git config user.name "bare-dot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Show sold-out badges in collections"
          git push
