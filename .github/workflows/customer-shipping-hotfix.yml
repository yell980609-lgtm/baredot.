name: Customer shipping hotfix
on:
  push:
    paths:
      - .github/customer-shipping-hotfix.cjs
      - .github/workflows/customer-shipping-hotfix.yml
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node .github/customer-shipping-hotfix.cjs
      - run: |
          git config user.name "bare-dot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Show shipping tracking in customer account"
          git push
