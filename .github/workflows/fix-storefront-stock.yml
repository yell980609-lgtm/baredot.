name: Fix storefront stock display

on:
  push:
    paths:
      - .github/fix-storefront-stock.cjs
      - .github/workflows/fix-storefront-stock.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply storefront stock fix
        run: node .github/fix-storefront-stock.cjs
      - name: Check worker syntax
        run: node --check _worker.js
      - name: Commit patch
        run: |
          git config user.name "bare-dot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Fix storefront sold-out detection"
          git push
