name: Fix Cloudflare worker syntax
on:
  push:
    paths:
      - .github/fix-worker-template.cjs
      - .github/workflows/fix-worker-template.yml
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node .github/fix-worker-template.cjs
      - run: node --check _worker.js
      - run: |
          git config user.name "bare-dot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Fix customer tracking worker syntax"
          git push
