name: Reconcile tracking order statuses

on:
  push:
    paths:
      - .github/reconcile-tracking-status.cjs
      - .github/workflows/reconcile-tracking-status.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply reconciliation patch
        run: node .github/reconcile-tracking-status.cjs
      - name: Check worker syntax
        run: node --check _worker.js
      - name: Commit patch
        run: |
          git config user.name "bare-dot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Reconcile tracked orders to shipping"
          git push
