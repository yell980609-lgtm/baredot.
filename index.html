<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAREDOT. | 1ST DROP</title>
  <meta name="description" content="BAREDOT. 1ST DROP #I'm BARED gymwear landing page" />
  <style>
    @font-face {
      font-family: "Inter Display";
      src: url("https://framerusercontent.com/assets/qITWJ2WdG0wrgQPDb8lvnYnTXDg.woff2") format("woff2");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --ink: #050505;
      --paper: #fff;
      --ice: #dceaf5;
      --blue: #0e222a;
      --muted: #747474;
      --line: rgba(255,255,255,.34);
      --radius: 8px;
      --promo-height: 28px;
      --logo-mask: url("https://framerusercontent.com/images/a3Pvzk5vHkS6uAT6JGV5VgPpTZk.png?width=1080&height=1080");
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: "Inter Display", Pretendard, "Noto Sans KR", system-ui, -apple-system, sans-serif;
      letter-spacing: 0;
    }

    img, video { max-width: 100%; display: block; }
    a { color: inherit; }
    .wrap { width: min(1120px, calc(100% - 36px)); margin: 0 auto; }

    .intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      background: #000;
      pointer-events: none;
      overflow: hidden;
      animation: intro-hide 5.2s ease forwards;
    }

    .intro-logo {
      position: relative;
      width: min(72vw, 760px);
      aspect-ratio: 1;
      overflow: hidden;
      -webkit-mask-image: var(--logo-mask);
      mask-image: var(--logo-mask);
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-position: center;
      -webkit-mask-size: contain;
      mask-size: contain;
      background: transparent;
      filter: drop-shadow(0 0 42px rgba(255,255,255,.24));
      opacity: 0;
      transform: scale(.98);
      animation: logo-complete 5.2s ease forwards;
    }

    .intro-logo::before,
    .intro-logo::after {
      content: "";
      position: absolute;
      inset: 0;
    }

    .intro-logo::before {
      background: #fff;
      clip-path: inset(0 100% 0 0);
      animation: logo-fill 5.2s cubic-bezier(.22,.72,.16,1) forwards;
    }

    .intro-logo::after {
      width: 34%;
      background: linear-gradient(100deg, transparent 0%, rgba(255,255,255,.18) 22%, #fff 48%, rgba(255,255,255,.86) 58%, transparent 100%);
      filter: blur(2px);
      transform: translateX(-190%);
      animation: logo-sweep 5.2s cubic-bezier(.22,.72,.16,1) forwards;
    }

    @keyframes logo-fill {
      0%, 18% { clip-path: inset(0 100% 0 0); }
      66%, 100% { clip-path: inset(0 0 0 0); }
    }

    @keyframes logo-sweep {
      0%, 10% { transform: translateX(-190%); opacity: 0; }
      18% { opacity: 1; }
      66% { transform: translateX(300%); opacity: 1; }
      74%, 100% { transform: translateX(300%); opacity: 0; }
    }

    @keyframes logo-complete {
      0% { opacity: 0; transform: scale(.965); }
      10%, 88% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.01); }
    }

    @keyframes intro-hide {
      0%, 88% { opacity: 1; visibility: visible; }
      100% { opacity: 0; visibility: hidden; }
    }

    @media (prefers-reduced-motion: reduce) {
      .intro-overlay, .intro-logo, .intro-logo::before, .intro-logo::after { animation-duration: 1s; }
    }

    .promo-bar {
      position: sticky;
      top: 0;
      z-index: 21;
      height: var(--promo-height);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 13px;
      padding: 0 18px;
      background: #111;
      color: #fff;
      font-size: 9px;
      font-weight: 900;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
    }

    .promo-status { color: #ff2600; }
    .promo-copy { color: rgba(255,255,255,.92); }

    .topbar {
      --topbar-logo-size: 46px;
      --topbar-logo-x: center;
      position: sticky;
      top: var(--promo-height);
      height: 47px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: -47px;
      background: transparent;
      pointer-events: none;
    }

    .topbar.is-scrolled { --topbar-logo-x: 18px; }

    .topbar::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.48);
      -webkit-mask-image: var(--logo-mask), linear-gradient(#000, #000);
      mask-image: var(--logo-mask), linear-gradient(#000, #000);
      -webkit-mask-size: var(--topbar-logo-size) var(--topbar-logo-size), 100% 100%;
      mask-size: var(--topbar-logo-size) var(--topbar-logo-size), 100% 100%;
      -webkit-mask-position: var(--topbar-logo-x) center, center;
      mask-position: var(--topbar-logo-x) center, center;
      -webkit-mask-repeat: no-repeat, no-repeat;
      mask-repeat: no-repeat, no-repeat;
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      transition: -webkit-mask-position .34s ease, mask-position .34s ease;
    }

    .logo {
      position: absolute;
      left: 50%;
      width: var(--topbar-logo-size);
      height: var(--topbar-logo-size);
      display: block;
      background: transparent;
      box-shadow: none;
      pointer-events: auto;
      transform: translateX(-50%);
      transition: left .34s ease, transform .34s ease;
    }

    .topbar.is-scrolled .logo {
      left: 18px;
      transform: translateX(0);
    }

    .logo img {
      width: 100%;
      height: 100%;
      opacity: 0;
    }

    .topnav {
      position: absolute;
      right: 18px;
      display: flex;
      align-items: center;
      gap: clamp(14px, 2.4vw, 34px);
      opacity: 0;
      transform: translateY(-4px);
      pointer-events: none;
      transition: opacity .24s ease, transform .24s ease;
    }

    .topbar.is-scrolled .topnav {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .topnav a {
      color: #fff;
      font-size: clamp(11px, 1vw, 14px);
      font-weight: 800;
      line-height: 1;
      text-decoration: none;
      text-transform: uppercase;
      opacity: .82;
      transition: opacity .2s ease;
    }

    .topnav a:hover { opacity: 1; }

    .hero {
      position: relative;
      min-height: 100svh;
      overflow: hidden;
      color: #fff;
      isolation: isolate;
    }

    .hero video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      background: #000;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.38) 62%, rgba(0,0,0,.72));
    }

    .hero-content {
      min-height: 100svh;
      display: grid;
      align-content: end;
      gap: 16px;
      padding: 130px 0 62px;
    }

    .drop-title {
      margin: 0;
      max-width: 760px;
      font-size: clamp(36px, 5.6vw, 83px);
      line-height: .95;
      font-weight: 900;
      text-transform: uppercase;
    }

    .drop-title .stencil { display: block; }
    .stencil { font-style: italic; letter-spacing: -.02em; }
    .tagline { margin: 0; font-size: clamp(14px, 2.1vw, 29px); font-weight: 800; font-style: italic; text-transform: lowercase; }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-top: 8px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 24px;
      border-radius: var(--radius);
      text-decoration: none;
      font-size: 18px;
      font-weight: 900;
      border: 1px solid transparent;
      transition: transform .2s ease, background .2s ease;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn.buy { background: var(--ice); color: var(--blue); }
    .btn.outline { color: #fff; border-color: var(--line); background: rgba(0,0,0,.18); }

    .shop-section {
      padding: 54px 0 72px;
      background: #fff;
      color: #101010;
    }

    .shop-head {
      display: flex;
      align-items: center;
      gap: clamp(22px, 4vw, 46px);
      margin-bottom: 28px;
    }

    .shop-head h2 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
    }

    .shop-tabs {
      display: flex;
      align-items: center;
      gap: clamp(24px, 5vw, 56px);
    }

    .shop-tabs a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 16px;
      color: #111;
      font-size: 14px;
      font-weight: 900;
      text-decoration: none;
      text-transform: uppercase;
    }

    .shop-tabs a:first-child { border: 1px solid #111; }

    .product-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .product-card {
      min-width: 0;
      color: #111;
      text-decoration: none;
    }

    .product-card figure { margin: 0; }

    .product-image {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4 / 5;
      background: #eee;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .35s ease;
    }

    .product-card:hover .product-image img { transform: scale(1.025); }

    .wish {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,.14);
      background: rgba(255,255,255,.3);
    }

    .wish::before {
      content: "♡";
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      color: rgba(0,0,0,.35);
      font-size: 19px;
      line-height: 1;
    }

    .product-info {
      display: grid;
      gap: 7px;
      padding: 12px 10px 0;
      text-align: center;
    }

    .product-name {
      overflow: hidden;
      margin: 0;
      color: #111827;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.25;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .product-price {
      color: #111;
      font-size: 15px;
      font-weight: 900;
    }

    footer { padding: 34px 0; background: #000; color: rgba(255,255,255,.52); font-size: 14px; }

    @media (max-width: 860px) {
      :root { --promo-height: 26px; }
      .promo-bar { gap: 7px; padding: 0 10px; font-size: 8px; }
      .topbar { --topbar-logo-size: 37px; --topbar-logo-x: center; height: 38px; margin-bottom: -38px; }
      .topbar.is-scrolled { --topbar-logo-x: 12px; }
      .topbar.is-scrolled .logo { left: 12px; }
      .topnav { right: 12px; gap: 10px; }
      .topnav a { font-size: 10px; }
      .intro-logo { width: min(86vw, 520px); }
      .hero-content { padding-bottom: 42px; }
      .shop-section { padding: 38px 0 54px; }
      .shop-head { align-items: flex-start; flex-direction: column; gap: 14px; margin-bottom: 22px; }
      .shop-tabs { width: 100%; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
      .shop-tabs a { flex: 0 0 auto; font-size: 12px; }
      .product-row { display: flex; gap: 6px; margin-inline: -18px; overflow-x: auto; padding: 0 18px 4px; scroll-snap-type: x mandatory; }
      .product-card { flex: 0 0 78%; scroll-snap-align: start; }
      .product-name { font-size: 12px; }
      .product-price { font-size: 14px; }
    }
  </style>
</head>
