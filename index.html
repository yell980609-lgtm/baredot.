<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>baredot.</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f5f0;
      color: #171717;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    main {
      width: min(720px, 100%);
    }

    h1 {
      margin: 0;
      font-size: clamp(48px, 10vw, 112px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    p {
      margin: 24px 0 0;
      max-width: 520px;
      font-size: 18px;
      line-height: 1.6;
      color: #55514a;
    }
  </style>
</head>
<body>
  <main>
    <h1>baredot.</h1>
    <p>main branch deployment is live.</p>
  </main>
</body>
</html>
